version: '3.8'

services:
  tee-worker:
    build: .
    ports:
      - "4100:4100"
    environment:
      - PORT=4100
      - TEE_WORKER_API_KEY=${TEE_WORKER_API_KEY:-dev-key}
    volumes:
      # Mount dstack socket for TEE operations (on Phala Cloud)
      - /var/run/dstack.sock:/var/run/dstack.sock
    restart: unless-stopped
